name: CD

on: 
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: build and deploy
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: us-west-2
      ECR_REGISTRY: 618642321086.dkr.ecr.us-west-2.amazonaws.com
      ECR_REPOSITORY: pii-redaction-api
      ECS_CLUSTER: pii-redaction-cluster
      ECS_SERVICE: pii-redaction-service
      TASK_DEFINITION_FAMILY: pii-redaction-api
      CONTAINER_NAME: pii-redaction-api
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push docker image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
      
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition \
            > task-definition.json
      
      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
 
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Wait for ECS service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster pii-redaction-cluster \
            --services pii-redaction-service

      - name: Update Cloudflare DNS with new task IP
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs list-tasks \
            --cluster pii-redaction-cluster \
            --service-name pii-redaction-service \
            --query "taskArns[0]" --output text)

          ENI_ID=$(aws ecs describe-tasks \
            --cluster pii-redaction-cluster \
            --tasks "$TASK_ARN" \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
            --output text)

          NEW_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query "NetworkInterfaces[0].Association.PublicIp" \
            --output text)

          echo "New task public IP: $NEW_IP"

          RECORD_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?type=A&name=pii-redaction.bengid.dev" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].id')

          if [ "$RECORD_ID" = "null" ] || [ -z "$RECORD_ID" ]; then
            echo "Could not find DNS record for pii-redaction.bengid.dev"
            exit 1
          fi

          RESPONSE=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"pii-redaction.bengid.dev\",\"content\":\"${NEW_IP}\",\"proxied\":true}")

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Cloudflare update failed: $RESPONSE"
            exit 1
          fi

          echo "DNS record updated to $NEW_IP"