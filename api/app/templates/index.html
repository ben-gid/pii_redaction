{% extends "layout.html" %}

{% block content %}
<div class="container">
    <p>Enter sensitive text below to detect and redact personally identifiable information.</p>
    
    <label for="text-input">Input Text</label>
    <div class="textarea-container" id="drop-zone">
        <textarea id="text-input" placeholder="Type, paste, or drop a text file (.txt, .md, etc.) here..."></textarea>
        <div class="drop-overlay">Drop file to load text</div>
    </div>
    
    <div class="controls-row">
        <div class="input-group">
            <label for="threshold-input">Threshold</label>
            <input type="number" id="threshold-input" min="0" max="1" step="0.01" value="0.3" placeholder="Threshold">
        </div>
        <button id="clear-btn" class="secondary-btn" style="display: none;" onclick="clearText()">clear</button>
        <button id="download-json-btn" class="secondary-btn" style="display: none;" onclick="downloadJSON()">Download JSON</button>
        <button id="redact-btn" onclick="redact()">Redact Text</button>
    </div>
    
    <div id="output-wrapper" class="output-section">
        <label>Redacted Result</label>
        <div id="redacted" class="output-box"></div>
        <label>Entities</label>
        <div id="entities" class="output-box"></div>
    </div>

    <div id="error-wrapper" class="output-section" role="alert">
        <div id="error-container" class="output-box error-message"></div>
    <div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Drag and drop functionality
    const dropZone = document.getElementById("drop-zone");
    const textarea = document.getElementById("text-input");

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files && files.length > 0) {
            const file = files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                textarea.value = event.target.result;
            };
            reader.readAsText(file);
        }
    }

    let lastRedactionResult = null;

    async function redact() {
        const text = document.getElementById("text-input").value;
        const threshold = document.getElementById("threshold-input").value;
        if (!text.trim()) return;
        
        const btn = document.getElementById("redact-btn");
        const downloadBtn = document.getElementById("download-json-btn");
        const originalText = btn.innerText;
        btn.innerText = "Redacting...";
        btn.disabled = true;
        downloadBtn.style.display = "none";
        lastRedactionResult = null;

        try {
            const resp = await fetch("/demo/redact", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ text: text, threshold: threshold }),
            });
            
            if (resp.ok) {
                const data = await resp.json();
                lastRedactionResult = data;
                document.getElementById("redacted").innerText = data.redacted;
                if (data.entities && data.entities.length > 0) {
                    document.getElementById("entities").innerHTML = data.entities.map(e =>
                        `<span class="entity-badge">${e.label}: <strong>${e.text}</strong> <span class="score">${Math.round(e.score * 100)}%</span></span>`
                    ).join("");
                } else {
                    document.getElementById("entities").innerHTML = `<span class="no-entities">No PII entities detected.</span>`;
                }
                document.getElementById("output-wrapper").classList.add("visible");
                downloadBtn.style.display = "inline-flex";
                
            } else {
                if (resp.status == 429) {
                    document.getElementById("error-container").innerText = "Limit Reached: try again in 24 hours.";
                }
                else {
                    document.getElementById("error-container").innerText = "Error: Failed to process request.";
                }
                document.getElementById("error-wrapper").classList.add("visible");
            }
        } catch (err) {
            document.getElementById("error-container").innerText = "Error: Network issue or API down.";
            document.getElementById("error-wrapper").classList.add("visible");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function downloadJSON() {
        if (!lastRedactionResult) return;
        const blob = new Blob([JSON.stringify(lastRedactionResult, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "pii_redacted_result.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    function clearText() {
        textarea = document.getElementById("text-input")
        textarea.value = ""
    }
</script>
{% endblock %}
